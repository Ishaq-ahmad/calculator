<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game project</title>
    <link rel="stylesheet" href="/calculator.css" />
    <style>
      /* Google Font */
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #3f536e83, #20335b9c);
      }

      #main-container {
        width: 360px;
        background: #20232e;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4),
          inset 0 1px 1px rgba(255, 255, 255, 0.05);
      }

      input {
        width: 100%;
        height: 80px;
        border: none;
        outline: none;
        border-radius: 15px;
        background: #2d3142;
        color: #fff;
        font-size: 2rem;
        text-align: right;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: inset 0 5px 10px rgba(0, 0, 0, 0.3);
      }

      #main-container div {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        margin-bottom: 15px;
      }

      button {
        height: 65px;
        border: none;
        border-radius: 15px;
        font-size: 1.2rem;
        font-weight: 600;
        cursor: pointer;
        background: #2d3142;
        color: #fff;
        transition: 0.25s ease;
        box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.35),
          -2px -2px 6px rgba(255, 255, 255, 0.03);
      }

      button:hover {
        transform: translateY(-3px);
        background: #3b4258;
      }

      button:active {
        transform: scale(0.95);
      }

      .side-btn {
        background: #ff9500;
        color: #fff;
      }

      .side-btn:hover {
        background: #ffad33;
      }

      .equal {
        background: #22c55e;
        color: #fff;
      }

      .equal:hover {
        background: #16a34a;
      }

      /* Responsive */

      @media (max-width: 400px) {
        #main-container {
          width: 95%;
          padding: 18px;
        }

        button {
          height: 58px;
          font-size: 1.1rem;
        }

        input {
          height: 70px;
          font-size: 1.7rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="main-container">
      <input type="text" readonly placeholder="0" />

      <div id="1">
        <button class="side-btn">AC</button>
        <button class="side-btn">DEL</button>
        <button class="side-btn">%</button>
        <button class="side-btn">/</button>
      </div>

      <div id="2">
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="side-btn">*</button>
      </div>

      <div id="3">
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="side-btn">-</button>
      </div>

      <div id="4">
        <button id="btn1">1</button>
        <button id="btn2">2</button>
        <button id="btn3">3</button>
        <button class="side-btn">+</button>
      </div>

      <div id="5">
        <button id="btn00">00</button>
        <button id="btn0">0</button>
        <button>.</button>
        <button class="equal">=</button>
      </div>
    </div>

    <script src="/calcultor.js"></script>
  </body>
</html>
